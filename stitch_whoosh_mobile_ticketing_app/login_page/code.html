<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        .shadow-sm { box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.05); }
        .shadow-md { box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.08); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar Section - Suppressing full nav for transactional page -->
<header class="flex justify-between items-center w-full px-margin-mobile h-16 sticky top-0 z-50 bg-surface shadow-md">
<button class="hover:opacity-90 transition-opacity active:scale-95 transition-transform text-primary p-2">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-primary">Whoosh</div>
<div class="w-10"></div> <!-- Spacer to balance header -->
</header>
<main class="flex-grow flex flex-col items-center px-margin-mobile py-stack-lg max-w-md mx-auto w-full">
<!-- Brand Identity Section -->
<div class="flex flex-col items-center mb-12">
<div class="w-20 h-20 bg-primary-container rounded-xl flex items-center justify-center shadow-md mb-stack-md">
<span class="material-symbols-outlined text-white text-4xl" data-icon="speed" style="font-variation-settings: 'FILL' 1;">speed</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">Selamat Datang</h1>
<p class="font-body-md text-body-md text-secondary mt-1">Masuk untuk melanjutkan perjalanan Anda</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-stack-md">
<!-- Email Input -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-secondary block ml-1" for="identifier">Email atau No. HP</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-secondary" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all shadow-sm font-body-md text-body-md" id="identifier" placeholder="nama@email.com" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-secondary block ml-1" for="password">Kata Sandi</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-secondary" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all shadow-sm font-body-md text-body-md" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="font-label-md text-label-md text-primary font-bold hover:underline" href="#">Lupa Kata Sandi?</a>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary py-4 rounded-lg font-headline-md text-headline-md font-bold shadow-md hover:bg-primary transition-colors active:scale-[0.98] mt-stack-lg" type="submit">
                Masuk
            </button>
</form>
<!-- Divider -->
<div class="flex items-center w-full my-stack-lg">
<div class="flex-grow h-px bg-surface-variant"></div>
<span class="px-4 font-label-sm text-label-sm text-secondary">atau masuk dengan</span>
<div class="flex-grow h-px bg-surface-variant"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-stack-md w-full mb-stack-lg">
<button class="flex items-center justify-center gap-2 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest hover:bg-surface-container transition-colors shadow-sm">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqEqIe77ZouFBy8pu-qzShckuh-iRGG2ginjnzbjMizG1cHcrFxo2Jc8PzH08_S_l7gtV-k5ElJhhMwWev6TG2r2-HZ1rQaW2dpPZh30H-xybcQ3QoxvNS7oQpBU2G1XB8FW5JwK95FBTQlE2isTBIId9OV2G1HZ3zW_sbPRimrJ6oEvruu-1YnVER2O_0FFDyvad6VAOjYGf1pBdOhhEwWNClWwfsioYUuxmxFx9Mheog6M9MYdVQIXR28AbnF2kP8z5kAKFBah8"/>
<span class="font-label-md text-label-md text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest hover:bg-surface-container transition-colors shadow-sm">
<span class="material-symbols-outlined text-[#1877F2]" data-icon="facebook" style="font-variation-settings: 'FILL' 1;">Notebook</span>
<span class="font-label-md text-label-md text-on-surface">Facebook</span>
</button>
</div>
<!-- Footer Actions -->
<div class="mt-auto pt-stack-lg text-center">
<p class="font-body-md text-body-md text-secondary">
                Belum punya akun? 
                <a class="text-primary font-bold hover:underline" href="#">Daftar</a>
</p>
</div>
</main>
<!-- Decorative Background Element -->
<div class="fixed -bottom-20 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -top-20 -right-20 w-80 h-80 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
